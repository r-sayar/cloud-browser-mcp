#cloud-config
# Hetzner Cloud server bootstrap for cloud-browser-mcp.
#
# BEFORE PASTING into the Hetzner "Cloud config" field, replace the two
# placeholders below:
#   1. ssh_authorized_keys: paste your laptop's SSH public key (cat ~/.ssh/id_ed25519.pub)
#   2. tailscale --authkey=...: paste a Tailscale auth key (https://login.tailscale.com/admin/settings/keys)
#      Recommended: reusable + ephemeral=false + tag the device (e.g. tag:cbm-server).

users:
  - name: cbm
    groups: [sudo, docker]
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - ssh-ed25519 AAAA__REPLACE_ME__YOUR_LAPTOP_PUBLIC_KEY_HERE__ your_email@example.com

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - ufw
  - rsync
  - git

write_files:
  - path: /etc/sysctl.d/99-tailscale.conf
    content: |
      net.ipv4.ip_forward = 1
      net.ipv6.conf.all.forwarding = 1

runcmd:
  # --- Docker (official repo) ---
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker

  # --- Tailscale (joins your tailnet so the browsers are private to you) ---
  - curl -fsSL https://tailscale.com/install.sh | sh
  - sysctl -p /etc/sysctl.d/99-tailscale.conf
  - tailscale up --authkey=tskey-auth-__REPLACE_ME__ --ssh --hostname=cbm-server --accept-routes=false

  # --- Firewall: drop everything from the public internet except SSH (still
  #     useful as a fallback if Tailscale ever fails). Tailscale traffic
  #     enters via tailscale0 and bypasses ufw. ---
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw --force enable

  # --- Project layout ---
  - install -d -o cbm -g cbm /opt/cloud-browser-mcp /opt/cloud-browser-mcp/data

  # Done. The deploy.sh script (run from your laptop) will rsync the repo +
  # AppImage + ./data, then `docker compose up -d --build`.

final_message: "cbm-server is up. From your laptop run: ./cloud/deploy.sh <tailscale-ip>"
