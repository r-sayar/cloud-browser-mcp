services:
  api:
    image: ghcr.io/steel-dev/steel-browser-api:latest
    entrypoint: /opt/cloud_agents/entrypoint-with-xvfb.sh
    ports:
      - "3000:3000"
      - "9223:9223"
    environment:
      DOMAIN: ${DOMAIN:-localhost:3000}
      CDP_DOMAIN: ${CDP_DOMAIN:-localhost:9223}
      CHROME_HEADLESS: "false"
      CHROME_USER_DATA_DIR: /data/profile
      DISABLE_CHROME_SANDBOX: "true"
      SKIP_FINGERPRINT_INJECTION: "true"
      LOG_STORAGE_ENABLED: "true"
      LOG_STORAGE_PATH: /data/logs/browser-logs.duckdb
    volumes:
      - ./data:/data
      - ./extensions/claude-in-chrome:/app/api/extensions/claude-in-chrome:ro
      - ./scripts/entrypoint-with-xvfb.sh:/opt/cloud_agents/entrypoint-with-xvfb.sh:ro
    networks:
      - steel-network

  ui:
    image: ghcr.io/steel-dev/steel-browser-ui:latest
    ports:
      - "5173:80"
    environment:
      API_URL: ${API_URL:-http://api:3000}
    depends_on:
      - api
    networks:
      - steel-network

networks:
  steel-network:
    name: steel-network
    driver: bridge
